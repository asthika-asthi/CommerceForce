version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: commerce_db

    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: YOUR_DB_PASSWORD 
      POSTGRES_DB: commerceforcedatabase

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  postgres_data: