version: '5.0.2'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/appdb

    ports:
      - "8000:8000"
    env_file:
       - ./backend/.env

  frontend:
    build: ./frontend
    container_name: react_frontend
    depends_on:
      - backend  
    ports:
      - "3000:3000"
volumes:
  postgres_data:
